<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object-Based Audio Editor</title>
    <style>
        /* Root variables */
        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d3d;
            --bg-canvas: #15151a;
            --bg-button: #333333;
            --bg-button-hover: #444444;
            --bg-button-active: #222222;
            --bg-button-disabled: #1d1d1d;
            --bg-input: #222222;
            --bg-modal-overlay: rgba(0, 0, 0, 0.45);
            
            --border-primary: #555555;
            --border-secondary: #777777;
            --border-disabled: #3d3d3d;
            
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --text-active: #e0e0e0;
            --text-disabled: #666666;
            
            --accent-blue: #0088ff;
            --accent-green: #00cc88;
            
            --transition-speed: 0.15s;
            --border-radius: 4px;
            --font-size-body: 13px;
            --font-size-heading: 14px;
            --padding-standard: 8px;
            --padding-section: 12px;
        }

        /* Global styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
            font-size: var(--font-size-body);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* Menu bar */
        .menu-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 36px;
            background-color: var(--bg-secondary);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
            border-bottom: 1px solid var(--border-primary);
            z-index: 100;
        }

        .menu-item {
            position: relative;
        }

        .menu-button {
            background-color: var(--bg-button);
            border: 1px solid var(--border-primary);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: var(--font-size-body);
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
            white-space: nowrap;
            user-select: none;
        }

        .menu-button:hover {
            background-color: var(--bg-button-hover);
            border-color: var(--border-secondary);
        }

        .menu-button:active {
            background-color: var(--bg-button-active);
            color: var(--text-secondary);
        }

        /* Dropdown menu */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: var(--border-radius);
            min-width: 150px;
            z-index: 101;
            margin-top: 4px;
        }

        .dropdown-menu.active {
            display: block;
        }

        .dropdown-item {
            padding: 8px 12px;
            color: var(--text-primary);
            cursor: pointer;
            transition: background-color var(--transition-speed);
            white-space: nowrap;
        }

        .dropdown-item:hover {
            background-color: var(--bg-button-hover);
        }

        /* Separator in menu */
        .menu-separator {
            width: 1px;
            height: 20px;
            background-color: var(--border-primary);
            margin: 0 4px;
        }

        /* Main container */
        .main-container {
            position: absolute;
            top: 36px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            gap: 0;
        }

        /* Left panel */
        .left-panel {
            width: 300px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-primary);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            transition: transform var(--transition-speed);
        }

        .left-panel.hidden {
            transform: translateX(-100%);
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 99;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.5);
        }

        .panel-header {
            padding: var(--padding-section);
            border-bottom: 1px solid var(--border-primary);
            font-size: var(--font-size-heading);
            font-weight: 600;
            color: var(--text-primary);
            flex-shrink: 0;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: var(--padding-section);
        }

        /* Sections */
        .properties-section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: var(--font-size-heading);
            font-weight: 600;
            color: var(--accent-blue);
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-primary);
        }

        .section-content {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Form elements */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-label {
            font-size: var(--font-size-body);
            color: var(--text-secondary);
            font-weight: 500;
        }

        input[type="text"],
        input[type="file"],
        select {
            background-color: var(--bg-input);
            border: 1px solid var(--border-primary);
            color: var(--text-primary);
            padding: 6px 8px;
            border-radius: var(--border-radius);
            font-size: var(--font-size-body);
            font-family: inherit;
            transition: border-color var(--transition-speed);
        }

        input[type="text"]:focus,
        input[type="file"]:focus,
        select:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(0, 136, 255, 0.2);
        }

        input[type="text"]:disabled,
        input[type="file"]:disabled,
        select:disabled {
            background-color: var(--bg-button-disabled);
            border-color: var(--border-disabled);
            color: var(--text-disabled);
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Sliders */
        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: var(--font-size-body);
        }

        .slider-value {
            color: var(--accent-green);
            font-weight: 500;
            font-size: 12px;
            min-width: 40px;
            text-align: right;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-green));
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: var(--text-primary);
            cursor: pointer;
            transition: background-color var(--transition-speed);
            border: 2px solid var(--bg-secondary);
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background-color: var(--accent-blue);
        }

        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: var(--text-primary);
            cursor: pointer;
            transition: background-color var(--transition-speed);
            border: 2px solid var(--bg-secondary);
        }

        input[type="range"]::-moz-range-thumb:hover {
            background-color: var(--accent-blue);
        }

        input[type="range"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Canvas container */
        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-canvas);
            position: relative;
            overflow: hidden;
        }

        #sceneCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 200;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--bg-modal-overlay);
            cursor: pointer;
        }

        .modal-dialog {
            position: relative;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: var(--border-radius);
            padding: 20px;
            min-width: 400px;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 201;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-primary);
        }

        .modal-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .button {
            background-color: var(--bg-button);
            border: 1px solid var(--border-primary);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: var(--font-size-body);
            font-weight: 500;
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
            white-space: nowrap;
            user-select: none;
        }

        .button:hover {
            background-color: var(--bg-button-hover);
            border-color: var(--border-secondary);
        }

        .button:active {
            background-color: var(--bg-button-active);
            color: var(--text-secondary);
        }

        .button.primary {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
            color: #000;
            font-weight: 600;
        }

        .button.primary:hover {
            background-color: #0099ff;
            border-color: #0099ff;
        }

        .button.primary:active {
            background-color: #0066cc;
            border-color: #0066cc;
        }

        /* Objects library sidebar */
        .objects-library {
            position: fixed;
            top: 36px;
            left: 0;
            width: 300px;
            height: calc(100vh - 36px);
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-primary);
            overflow-y: auto;
            transform: translateX(-100%);
            transition: transform var(--transition-speed);
            z-index: 98;
        }

        .objects-library.active {
            transform: translateX(0);
        }

        .library-header {
            padding: var(--padding-section);
            border-bottom: 1px solid var(--border-primary);
            font-size: var(--font-size-heading);
            font-weight: 600;
            color: var(--text-primary);
            position: sticky;
            top: 0;
            background-color: var(--bg-secondary);
        }

        .library-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: var(--padding-section);
        }

        .library-item {
            padding: 8px 10px;
            background-color: var(--bg-button);
            border: 1px solid var(--border-primary);
            border-radius: var(--border-radius);
            color: var(--text-primary);
            cursor: pointer;
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
            font-size: var(--font-size-body);
        }

        .library-item:hover {
            background-color: var(--bg-button-hover);
            border-color: var(--border-secondary);
        }

        .library-item.selected {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
            color: #000;
            font-weight: 600;
        }

        /* Disabled state overlay */
        .disabled-overlay {
            opacity: 0.5;
            pointer-events: none;
        }

        /* Responsive */
        @media (max-width: 1000px) {
            .left-panel {
                transform: translateX(-100%);
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 99;
                box-shadow: 2px 0 8px rgba(0, 0, 0, 0.5);
            }

            .left-panel.visible {
                transform: translateX(0);
            }

            .panel-toggle {
                display: flex;
            }
        }

        @media (min-width: 1001px) {
            .panel-toggle {
                display: none;
            }

            .left-panel {
                position: relative;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: var(--border-primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: var(--border-secondary);
        }

        /* File input styling */
        input[type="file"]::file-selector-button {
            background-color: var(--bg-button);
            border: 1px solid var(--border-primary);
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 12px;
            transition: background-color var(--transition-speed);
            margin-right: 8px;
        }

        input[type="file"]::file-selector-button:hover {
            background-color: var(--bg-button-hover);
        }
    </style>
</head>
<body>
    <!-- Menu bar -->
    <div class="menu-bar">
        <div class="menu-item">
            <button class="menu-button" id="fileMenuBtn">File</button>
            <div class="dropdown-menu" id="fileDropdown">
                <div class="dropdown-item" onclick="window.handleExit()">Exit</div>
            </div>
        </div>

        <div class="menu-separator"></div>

        <button class="menu-button panel-toggle" id="togglePanelBtn" onclick="window.uiController && window.uiController.toggleObjectsLibrary()">Objects Library</button>

        <button class="menu-button" id="addObjectBtn" onclick="window.uiController && window.uiController.openAddObjectModal()">Add Object</button>

        <div class="menu-separator"></div>

        <button class="menu-button" id="saveSceneBtn" onclick="window.uiController && window.uiController.openSaveSceneModal()">Save Scene</button>

        <button class="menu-button" id="loadSceneBtn" onclick="window.uiController && window.uiController.openLoadSceneModal()">Load Scene</button>
    </div>

    <!-- Main container -->
    <div class="main-container">
        <!-- Left properties panel -->
        <div class="left-panel" id="leftPanel">
            <div class="panel-header">Properties</div>
            <div class="panel-content">
                <!-- Object Info section -->
                <div class="properties-section">
                    <div class="section-title">Object Info</div>
                    <div class="section-content">
                        <div class="form-group">
                            <label class="form-label">Object Name</label>
                            <input type="text" id="objectNameInput" placeholder="Enter object name" disabled oninput="window.uiController && window.uiController.onObjectNameChange(this.value)">
                        </div>
                    </div>
                </div>

                <!-- Audio Controls section -->
                <div class="properties-section">
                    <div class="section-title">Audio Controls</div>
                    <div class="section-content" id="audioControlsSection">
                        <div class="slider-group">
                            <div class="slider-label">
                                <span>Volume</span>
                                <span class="slider-value" id="volumeValue">1.0</span>
                            </div>
                            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" disabled oninput="window.uiController && window.uiController.onPropertySliderChange('volume', this.value)">
                        </div>

                        <div class="slider-group">
                            <div class="slider-label">
                                <span>Pitch</span>
                                <span class="slider-value" id="pitchValue">1.0</span>
                            </div>
                            <input type="range" id="pitchSlider" min="0.5" max="2.0" step="0.01" value="1" disabled oninput="window.uiController && window.uiController.onPropertySliderChange('pitch', this.value)">
                        </div>
                    </div>
                </div>

                <!-- Image Controls section -->
                <div class="properties-section">
                    <div class="section-title">Image Controls</div>
                    <div class="section-content" id="imageControlsSection">
                        <div class="slider-group">
                            <div class="slider-label">
                                <span>Brightness</span>
                                <span class="slider-value" id="brightnessValue">0.0</span>
                            </div>
                            <input type="range" id="brightnessSlider" min="-1" max="1" step="0.01" value="0" disabled oninput="window.uiController && window.uiController.onPropertySliderChange('brightness', this.value)">
                        </div>

                        <div class="slider-group">
                            <div class="slider-label">
                                <span>Saturation</span>
                                <span class="slider-value" id="saturationValue">1.0</span>
                            </div>
                            <input type="range" id="saturationSlider" min="0" max="2" step="0.01" value="1" disabled oninput="window.uiController && window.uiController.onPropertySliderChange('saturation', this.value)">
                        </div>

                        <div class="slider-group">
                            <div class="slider-label">
                                <span>Hue</span>
                                <span class="slider-value" id="hueValue">0°</span>
                            </div>
                            <input type="range" id="hueSlider" min="0" max="360" step="1" value="0" disabled oninput="window.uiController && window.uiController.onPropertySliderChange('hue', this.value)">
                        </div>

                        <div class="slider-group">
                            <div class="slider-label">
                                <span>Grayscale</span>
                                <span class="slider-value" id="grayscaleValue">0.0</span>
                            </div>
                            <input type="range" id="grayscaleSlider" min="0" max="1" step="0.01" value="0" disabled oninput="window.uiController && window.uiController.onPropertySliderChange('grayscale', this.value)">
                        </div>

                        <div class="slider-group">
                            <div class="slider-label">
                                <span>Blur</span>
                                <span class="slider-value" id="blurValue">0.0</span>
                            </div>
                            <input type="range" id="blurSlider" min="0" max="1" step="0.01" value="0" disabled oninput="window.uiController && window.uiController.onPropertySliderChange('blur', this.value)">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Canvas area -->
        <div class="canvas-container" id="canvasContainer">
            <canvas id="sceneCanvas"></canvas>
        </div>
    </div>

    <!-- Objects Library sidebar -->
    <div class="objects-library" id="objectsLibrary">
        <div class="library-header">Objects</div>
        <div class="library-list" id="objectsList">
            <!-- Objects will be populated here -->
        </div>
    </div>

    <!-- Add Object Modal -->
    <div class="modal" id="addObjectModal">
        <div class="modal-overlay" onclick="closeAddObjectModal()"></div>
        <div class="modal-dialog">
            <div class="modal-title">Add Audio Object</div>
            <div class="modal-content">
                <div class="form-group">
                    <label class="form-label">Object Name</label>
                    <input type="text" id="modalObjectName" placeholder="Enter object name">
                </div>

                <div class="form-group">
                    <label class="form-label">Audio File</label>
                    <input type="file" id="modalAudioFile" accept=".mp3,.wav">
                </div>

                <div class="form-group">
                    <label class="form-label">Image File</label>
                    <input type="file" id="modalImageFile" accept=".png,.jpg,.jpeg,.gif,.bmp">
                </div>
            </div>
            <div class="modal-buttons">
                <button class="button" onclick="window.uiController && window.uiController.closeAddObjectModal()">Cancel</button>
                <button class="button primary" onclick="window.uiController && window.uiController.onAddObjectConfirm()">Add</button>
            </div>
        </div>
    </div>

    <!-- Save Scene Modal -->
    <div class="modal" id="saveSceneModal">
        <div class="modal-overlay" onclick="closeSaveSceneModal()"></div>
        <div class="modal-dialog">
            <div class="modal-title">Save Scene</div>
            <div class="modal-content">
                <div class="form-group">
                    <label class="form-label">Filename</label>
                    <input type="text" id="sceneFilename" placeholder="Scene name">
                </div>
            </div>
            <div class="modal-buttons">
                <button class="button" onclick="window.uiController && window.uiController.closeSaveSceneModal()">Cancel</button>
                <button class="button primary" onclick="window.uiController && window.uiController.onSaveSceneConfirm()">Save</button>
            </div>
        </div>
    </div>

    <!-- Load Scene Modal -->
    <div class="modal" id="loadSceneModal">
        <div class="modal-overlay" onclick="closeLoadSceneModal()"></div>
        <div class="modal-dialog">
            <div class="modal-title">Load Scene</div>
            <div class="modal-content">
                <div class="form-group">
                    <label class="form-label">Saved Scenes</label>
                    <select id="sceneSelect">
                        <option value="">-- No saved scenes --</option>
                    </select>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="button" onclick="window.uiController && window.uiController.closeLoadSceneModal()">Cancel</button>
                <button class="button primary" onclick="window.uiController && window.uiController.onLoadSceneConfirm()">Load</button>
            </div>
        </div>
    </div>

    <!-- Phase 2: External JavaScript files -->
    <script src="js/AudioEngine.js"></script>
    <script src="js/AudioObject.js"></script>
    <script src="js/Spectator.js"></script>
    <script src="js/Scene.js"></script>
    <!-- Phase 3: Rendering and input -->
    <script src="js/Renderer.js"></script>
    <script src="js/Input.js"></script>
    <!-- Phase 4: UI Controller -->
    <script src="js/UI.js"></script>
    <!-- Main application -->
    <script src="js/app.js"></script>
</body>
</html>
